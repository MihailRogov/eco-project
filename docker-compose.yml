version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ecouser
      POSTGRES_PASSWORD: ecopass
      POSTGRES_DB: ecodb
    volumes:
      - ./db_data:/var/lib/postgresql/data
  
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
    depends_on:
      - db

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/usr/share/nginx/html:ro
    depends_on:
      - api